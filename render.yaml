services:
  - type: web
    name: book-beacon-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false   # your Neon URL: postgresql+asyncpg://...
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret for you
      - key: GEMINI_API_KEY
        sync: false   # optional; unset = core API only, keeper off duty
      - key: GOOGLE_BOOKS_API_KEY
        sync: false   # optional; unset = book search still works, just rate-limited
      - key: CORS_ORIGINS
        sync: false   # JSON array, e.g. ["https://your-frontend.vercel.app"]
